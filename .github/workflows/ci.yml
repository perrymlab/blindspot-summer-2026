name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Run unit tests
        run: python -m pytest
